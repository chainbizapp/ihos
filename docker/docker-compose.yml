services:
  postgres:
    image: postgres:16-alpine
    container_name: ihos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ihos
      POSTGRES_PASSWORD: ihos_dev_password
      POSTGRES_DB: ihos_dev
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ihos -d ihos_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ihos_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
